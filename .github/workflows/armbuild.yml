name: Build MinecraftConsoles ARM64 (Final)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Качаем только верхушку, без истории

      - name: Install Dependencies and Cross-Compiler
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            cmake \
            make \
            pkg-config \
            libssl-dev:arm64 \
            zlib1g-dev:arm64 \
            libcurl4-openssl-dev:arm64

      - name: Build
        env:
          # Магия для того, чтобы pkg-config не запутался в архитектурах
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          # Конфигурируем с явным указанием системы
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_BUILD_TYPE=Release

          # Собираем
          cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftConsoles-linux-arm64
          # В репозитории исполняемый файл называется 'mcc'
          path: build/mcc
