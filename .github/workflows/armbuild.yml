name: Build MinecraftConsoles ARM64 (Final)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Качаем только верхушку, без истории

     - name: Install Dependencies and Cross-Compiler
        run: |
          sudo dpkg --add-architecture arm64
          
          # 1. Очищаем все текущие источники, чтобы не было конфликтов
          sudo rm -rf /etc/apt/sources.list.d/*
          
          # 2. Создаем чистый конфиг с разделением по архитектурам
          # Для amd64 используем стандартные зеркала Azure (они быстрее в GA)
          # Для arm64 используем официальный ports.ubuntu.com
          sudo bash -c 'cat <<EOF > /etc/apt/sources.list
          # AMD64 Repos
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-backports main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-security main restricted universe multiverse

          # ARM64 Repos (Ports)
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF'

          # 3. Обновляемся и ставим пакеты
          sudo apt-get update -y
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            cmake \
            make \
            pkg-config \
            libssl-dev:arm64 \
            zlib1g-dev:arm64 \
            libcurl4-openssl-dev:arm64

      - name: Build
        env:
          # Магия для того, чтобы pkg-config не запутался в архитектурах
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          # Конфигурируем с явным указанием системы
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_BUILD_TYPE=Release

          # Собираем
          cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftConsoles-linux-arm64
          # В репозитории исполняемый файл называется 'mcc'
          path: build/mcc
