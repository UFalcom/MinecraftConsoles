name: Build MinecraftConsoles ARM64

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies and Cross-Compiler
        run: |
          sudo dpkg --add-architecture arm64
          sudo rm -rf /etc/apt/sources.list.d/* || true
          sudo bash -c 'cat <<EOF > /etc/apt/sources.list
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF'
          sudo apt-get update
          sudo apt-get install -y g++-aarch64-linux-gnu cmake make pkg-config libssl-dev:arm64 zlib1g-dev:arm64 libcurl4-openssl-dev:arm64

      - name: Patch for Linux Porting
        run: |
          # 1. Bypass Windows check in CMake
          sed -i 's/FATAL_ERROR/STATUS/g' CMakeLists.txt
          sed -i 's/project.*/project(MinecraftConsoles LANGUAGES C CXX)/g' CMakeLists.txt
          sed -i '/ASM_MASM/d' CMakeLists.txt
          sed -i '/RC_COMPILER/d' CMakeLists.txt
          sed -i '/enable_language(RC)/d' CMakeLists.txt

          # 2. Создаем заглушку windows.h для Linux
          # Это позволит компилятору не падать на #include <windows.h>
          mkdir -p fake_windows
          cat <<EOF > fake_windows/windows.h
          #ifndef FAKE_WINDOWS_H
          #define FAKE_WINDOWS_H
          #include <stdint.h>
          typedef uint32_t DWORD;
          typedef int32_t  BOOL;
          typedef uint8_t  BYTE;
          typedef uint16_t WORD;
          typedef float    FLOAT;
          typedef void* HANDLE;
          typedef void* HWND;
          typedef void* HINSTANCE;
          typedef const char* LPCSTR;
          typedef char* LPSTR;
          #define TRUE 1
          #define FALSE 0
          #define CALLBACK
          #define WINAPI
          #endif
          EOF

          # 3. Принудительно подключаем нашу заглушку ко всем файлам через флаги компилятора
          echo "SET(CMAKE_CXX_FLAGS \"\${CMAKE_CXX_FLAGS} -I\${CMAKE_SOURCE_DIR}/fake_windows\")" >> CMakeLists.txt
      - name: Configure
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: cmake -B build -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_FIND_ROOT_PATH=/usr/lib/aarch64-linux-gnu -DCMAKE_BUILD_TYPE=Release -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftConsoles-linux-arm64
          path: build/mcc
